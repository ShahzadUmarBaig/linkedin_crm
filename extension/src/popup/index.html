<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LinkedIn CRM</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0d10;
        --panel: #16161b;
        --panel-2: #1d1d23;
        --line: #2a2a31;
        --line-strong: #3a3a44;
        --ink: #e9e9ee;
        --muted: #9a9aa6;
        --faint: #6c6c77;
        --accent: #5b8def;
      }
      body { font: 13px system-ui, -apple-system, sans-serif; width: 320px; margin: 0; padding: 16px; background: var(--bg); color: var(--ink); }
      h1 { font-size: 14px; margin: 0 0 12px; }
      h2 { font-size: 11px; margin: 16px 0 6px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.08em; }
      label { display: block; margin-top: 8px; font-size: 12px; color: var(--muted); }
      input {
        width: 100%; padding: 7px 9px; margin-top: 3px; border: 1px solid var(--line-strong);
        border-radius: 6px; font-size: 12px; box-sizing: border-box;
        background: var(--panel); color: var(--ink);
      }
      input::placeholder { color: var(--faint); }
      input:focus { outline: none; border-color: var(--accent); }
      button { padding: 8px 12px; margin-top: 12px; border-radius: 6px; border: 1px solid var(--accent); background: var(--accent); color: #0d0d10; cursor: pointer; font-size: 13px; font-weight: 600; }
      button.secondary { background: var(--panel-2); color: var(--ink); border-color: var(--line-strong); font-weight: 400; }
      button:hover { filter: brightness(1.08); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .stats { background: var(--panel); border: 1px solid var(--line); padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 12px; }
      .stats div { display: flex; justify-content: space-between; padding: 2px 0; }
      .status { margin-top: 8px; font-size: 12px; padding: 7px 9px; border-radius: 6px; }
      .status.ok { background: #15281c; color: #6fd398; border: 1px solid #235437; }
      .status.err { background: #2a1518; color: #e8848a; border: 1px solid #5a2a2f; }
      .row { display: flex; gap: 8px; }
      .row button { flex: 1; }
    </style>
  </head>
  <body>
    <h1>LinkedIn CRM</h1>

    <h2>Captured this session</h2>
    <div class="stats" id="stats">…</div>
    <div id="lastCapture" style="font-size:11px;color:var(--muted);margin-top:6px"></div>

    <div class="row">
      <button id="scrape">Scrape now</button>
      <button id="clear" class="secondary">Clear</button>
    </div>
    <button id="copyDom" class="secondary" style="margin-top:6px;width:100%">Copy DOM (debug)</button>
    <div id="status"></div>

    <h2>Settings</h2>
    <label>API base URL
      <input id="apiBaseUrl" placeholder="https://your-crm.vercel.app" />
    </label>
    <label>Ingest secret
      <input id="ingestSecret" type="password" placeholder="EXTENSION_INGEST_SECRET" />
    </label>
    <label>User ID
      <input id="userId" placeholder="Supabase auth user_id (uuid)" />
    </label>
    <label>Your LinkedIn slug
      <input id="selfLinkedinSlug" placeholder="the bit after linkedin.com/in/" />
    </label>
    <button id="save" class="secondary">Save settings</button>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
