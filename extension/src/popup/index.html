<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LinkedIn CRM</title>
    <style>
      body { font: 13px system-ui, -apple-system, sans-serif; width: 320px; margin: 0; padding: 16px; }
      h1 { font-size: 14px; margin: 0 0 12px; }
      h2 { font-size: 12px; margin: 16px 0 6px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
      label { display: block; margin-top: 8px; font-size: 12px; color: #444; }
      input { width: 100%; padding: 6px 8px; margin-top: 2px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; box-sizing: border-box; }
      button { padding: 8px 12px; margin-top: 12px; border-radius: 4px; border: none; background: #0a66c2; color: white; cursor: pointer; font-size: 13px; }
      button.secondary { background: #f3f3f3; color: #333; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .stats { background: #f7f7f7; padding: 8px; border-radius: 4px; margin-top: 8px; font-size: 12px; }
      .stats div { display: flex; justify-content: space-between; padding: 2px 0; }
      .status { margin-top: 8px; font-size: 12px; padding: 6px; border-radius: 4px; }
      .status.ok { background: #e7f5ec; color: #1d6f3a; }
      .status.err { background: #fdecea; color: #a3261b; }
      .row { display: flex; gap: 8px; }
      .row button { flex: 1; }
    </style>
  </head>
  <body>
    <h1>LinkedIn CRM</h1>

    <h2>Captured this session</h2>
    <div class="stats" id="stats">…</div>
    <div id="lastCapture" style="font-size:11px;color:#666;margin-top:6px"></div>

    <div class="row">
      <button id="scrape">Scrape now</button>
      <button id="clear" class="secondary">Clear</button>
    </div>
    <div id="status"></div>

    <h2>Settings</h2>
    <label>API base URL
      <input id="apiBaseUrl" placeholder="https://your-crm.vercel.app" />
    </label>
    <label>Ingest secret
      <input id="ingestSecret" type="password" placeholder="EXTENSION_INGEST_SECRET" />
    </label>
    <label>User ID
      <input id="userId" placeholder="Supabase auth user_id (uuid)" />
    </label>
    <button id="save" class="secondary">Save settings</button>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
